<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToDo — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>

    <!-- ══════════ HEADER -->
    <header class="header">
      <a href="dashboard.html" class="header__brand">
        <div class="header__icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="3" width="18" height="18" rx="5" stroke="white" stroke-width="2.2"/>
            <path d="M8 12l3 3 5-5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="header__name">ToDo</span>
      </a>

      <button class="header__logout" id="btnLogout">Logout</button>
    </header>

    <!-- ══════════ MAIN -->
    <main class="main">
      <div class="card">

        <div class="card__hello">
          <h1>Hello, <span class="card__email" id="userEmail"></span> 👋</h1>
          <p>What would you like to accomplish today?</p>
        </div>

        <div class="card__input-row">
          <input
            type="text"
            class="task-input"
            id="taskInput"
            placeholder="Add a new task..."
            maxlength="120"
          />
          <button class="btn-add" id="btnAdd">+ Add</button>
        </div>
        <span class="task-erro" id="erroTask"></span>

        <ul class="task-list" id="taskList"></ul>

      </div>
    </main>

    <script src="dashboard.js"></script>
  </body>
</html>
