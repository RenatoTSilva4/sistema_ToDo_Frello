<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ToDo — Create Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
    <style>
      .barra-forca {
        height: 4px;
        border-radius: 4px;
        background: #e5e7eb;
        margin-top: 8px;
        overflow: hidden;
      }

      .barra-forca__preenchimento {
        height: 100%;
        border-radius: 4px;
        width: 0;
        transition: width 0.3s ease, background 0.3s ease;
      }

      .rotulo-forca {
        font-size: 0.76rem;
        font-weight: 500;
        margin-top: 5px;
        min-height: 1.1em;
      }
    </style>
  </head>
  <body>

    <main class="pagina-principal">

      <!-- ══════════ PAINEL ESQUERDO (desktop only) -->
      <section class="painel painel-esquerdo">
        <div class="marca">
          <div class="icone-marca">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="3" y="3" width="18" height="18" rx="5" stroke="white" stroke-width="2.2"/>
              <path d="M8 12l3 3 5-5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="nome-marca">ToDo</div>
        </div>

        <div class="conteudo-painel">
          <h1>Start organizing your tasks today.</h1>
          <p>Create your account and boost your productivity.</p>
        </div>

        <div class="rodape-painel">
          <span>Copyright &copy; 2025 ToDo LTD.</span>
          <a href="#">Privacy Policy</a>
        </div>
      </section>

      <!-- ══════════ PAINEL DIREITO (form) -->
      <section class="painel painel-direito">
        <div class="caixa-login">

          <!-- Brand visível apenas no mobile -->
          <div class="marca-mobile">
            <div class="icone-marca icone-marca--azul">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="3" y="3" width="18" height="18" rx="5" stroke="white" stroke-width="2.2"/>
                <path d="M8 12l3 3 5-5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="nome-marca nome-marca--escuro">ToDo</div>
          </div>

          <div class="cabecalho-login">
            <h2>Create Account</h2>
            <p>Fill in the fields below to create your account.</p>
          </div>

          <form class="formulario-login" id="formCadastro" novalidate>

            <!-- Full Name -->
            <div class="grupo-campo">
              <label for="name">Full Name</label>
              <input
                type="text"
                id="name"
                name="name"
                placeholder="John Doe"
                autocomplete="name"
              />
              <span class="msg-erro" id="erroName"></span>
            </div>

            <!-- Email -->
            <div class="grupo-campo">
              <label for="email">Email</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="user@company.com"
                autocomplete="email"
              />
              <span class="msg-erro" id="erroEmail"></span>
            </div>

            <!-- Password + strength -->
            <div class="grupo-campo">
              <label for="password">Password</label>
              <div class="campo-senha">
                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder="Create a password"
                  autocomplete="new-password"
                />
                <button type="button" class="alternar-senha" id="btnVerSenha" aria-label="Toggle password visibility">
                  <svg id="iconeOlho" width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="#9CA3AF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="12" cy="12" r="3" stroke="#9CA3AF" stroke-width="1.8"/>
                  </svg>
                </button>
              </div>
              <div class="barra-forca">
                <div class="barra-forca__preenchimento" id="forcaPreenchimento"></div>
              </div>
              <span class="rotulo-forca" id="forcaRotulo"></span>
              <span class="msg-erro" id="erroPassword"></span>
            </div>

            <!-- Confirm Password -->
            <div class="grupo-campo">
              <label for="confirmPassword">Confirm Password</label>
              <div class="campo-senha">
                <input
                  type="password"
                  id="confirmPassword"
                  name="confirmPassword"
                  placeholder="Repeat your password"
                  autocomplete="new-password"
                />
                <button type="button" class="alternar-senha" id="btnVerConfirm" aria-label="Toggle password visibility">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="#9CA3AF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="12" cy="12" r="3" stroke="#9CA3AF" stroke-width="1.8"/>
                  </svg>
                </button>
              </div>
              <span class="msg-erro" id="erroConfirm"></span>
            </div>

            <button type="submit" class="botao-principal" id="btnCadastrar">Create Account</button>

          </form>

          <p class="texto-registro">
            Already have an account? <a href="index.html">Log In.</a>
          </p>

        </div>
      </section>

    </main>

    <script src="../js/cadastro.js"></script>
  </body>
</html>
